<!DOCTYPE html>
<html lang="en">
<head>

    <!-- ? Meta tags -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--
    Overview:
    Meta tags provide metadata about the HTML document. They appear in the <head>
    and are used by browsers, search engines, social platforms and devices.
    This file documents common meta tags, attributes, examples and SEO best practices.
  -->

  <!-- Basic / Required Meta Tags -->
  <!-- Charset: declare document encoding early to avoid rendering issues -->
  <meta charset="utf-8" />
  <!-- Viewport: essential for responsive design on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Document metadata -->
  <!-- Title tag is separate; meta description provides a summary shown in SERPs -->
  <!-- Description: write a concise, unique summary for each page (120-160 chars recommended) -->
  <meta name="description" content="Concise page summary: what this page is about. Use unique description per page; include primary keywords naturally." />

  <!-- Author: optional -->
  <meta name="author" content="Your Organization or Name" />

  <meta name="author" content="Ajay solanki">

  <!-- Robots: control indexing/crawling at page level -->
  <!-- Example: index, follow (default) — other values: noindex, nofollow, none, noarchive -->
  <meta name="robots" content="index, follow" />

  <!-- Referrer policy: control Referer header sent on navigation -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Theme color for mobile browsers (address bar on Android) -->
  <meta name="theme-color" content="#0a84ff" />

  <!-- X-UA-Compatible: legacy IE compatibility (mostly obsolete but sometimes used) -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Content-Language: indicates language of the page (useful but hreflang is preferred for SEO) -->
  <meta http-equiv="Content-Language" content="en" />

  <!-- Avoid using meta keywords — ignored by major search engines and can encourage keyword stuffing -->
  <!-- <meta name="keywords" content="old, deprecated, list"> -->

  <!-- Social / Rich preview meta tags -->
  <!-- Open Graph (Facebook, LinkedIn, many crawlers use these) -->
  <meta property="og:title" content="Page Title — Keep it descriptive" />
  <meta property="og:description" content="A similarly concise description optimized for social sharing." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://example.com/page" />
  <meta property="og:image" content="https://example.com/og-image.jpg" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Page Title" />
  <meta name="twitter:description" content="Short description for Twitter card." />
  <meta name="twitter:image" content="https://example.com/twitter-image.jpg" />

  <!-- Canonical link (not a meta tag, but critical for SEO) -->
  <link rel="canonical" href="https://example.com/page" />
