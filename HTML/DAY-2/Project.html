<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project (Forms & Tables)</title>
</head>
<body>

    <form action="https://localhost:5500/api/users" method="post">

        <fieldset>
            <legend>Your Info 😎</legend>

            <label for="uname">Enter Your Name</label><br>
            <input type="text" id="uname" placeholder="Enter Your Name" required><br><br>

            <label for="email">Enter Your Email</label><br>
            <input type="email" id="email" placeholder="Enter Your Email" required> <br><br>

            <label for="phone">Enter Your Contact Number</label><br>
            <input type="tel" id="phone" placeholder="Enter Your Contact Number" required> <br><br>

            <label for="password">Enter Your Password</label> <br>
            <input type="password" id="password" placeholder="Enter Your Password"> <br><br>

            <label for="subject">Select Your Subject</label> 
            <select name="" id="">
                <option value="">--Select Subject--</option>
                <option value="Java">Java</option>
                <option value="JavaScript">JavaScript</option>
                <option value="HTML">HTML</option>
            </select> <br><br>

            <fieldset>
                <legend>Enter Your Message</legend>
                <textarea name="" id="" cols="50" rows="5"></textarea><br><br>
            </fieldset>

            <br><br>
            <button type="submit">Submit</button>

        </fieldset>

     






    </form>
    
</body>
</html>
