<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media & Multi-Media In HTML</title>
</head>
<body>
    <h1>Media & Multi-Media In HTML</h1>

    <!-- image tag -->

    <!-- <img src="./Assets/img1.jpg" 
        alt="nature image" 
        width="100" 
        height="100" 
        loading="lazy"
    > -->

    <figure>
        <img src="./Assets/ganesh.png" alt="ganesh" width="200">
        <figcaption>Lord Ganesh Photo</figcaption>
    </figure>


    <!-- audio and video tag -->

   
    <audio controls loop muted>
        <source src="./Assets/audio.mp3">
    </audio>

    <br>

    <video width="400" controls loop playsinline>
        <source src="./Assets/video1.mp4">
        <source src="./Assets/video2.mp4">
    </video>

    <!-- iframe tag -->

    <br>

    <h2>Website : </h2>
    <iframe src="https://www.wikipedia.org/" frameborder="0" width="100%" height="400">

    </iframe>

    <!-- youtube -->
     <h2>Youtube Video</h2>
     <iframe width="560" height="315" 
     src="https://www.youtube.com/embed/AqNjBGeExm4?si=qt3Gw5AXQOBFgNpW" 
     title="YouTube video player" 
     frameborder="0" 
     allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
     referrerpolicy="strict-origin-when-cross-origin" 
     allowfullscreen>
    </iframe>

    <!-- Google Map -->

    <h2>Google Map</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d114723.45237102984!2d73.09068449392613!3d22.32208183091643!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395fc8ab91a3ddab%3A0xac39d3bfe1473fb8!2sVadodara%2C%20Gujarat!5e1!3m2!1sen!2sin!4v1778117590911!5m2!1sen!2sin" 
            width="100%" 
            height="450" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>

    <!-- Important -->

    <img src="./Assets/img1.jpg" 
    alt=""
    width="400"
    srcset="./Assets/ganesh.png 800w,">

    <picture>

        <source media="(max-width:500px)" srcset="ganesh.png">
        <img src="./Assets/img1.jpg" alt="" width="500">
    </picture>


   




    
</body>
</html>
